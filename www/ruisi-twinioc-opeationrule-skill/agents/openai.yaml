interface:
  display_name: 'Ruisi TwinIOC Operation Rule'
  short_description: '记录、查询并匹配温度规则、告警规则和定时任务规则'
  default_prompt: |
    当用户要记录温度规则、告警规则、定时任务规则，或者要查看已记录规则、查询操作历史时，使用 $ruisi-twinioc-opeationrule-skill。
    - 写入记录时 `token` 为兼容参数但非必须，记录中不再保存 `token`。
    - 匹配时（温度或告警）会自动查找已记录的规则并**仅返回最新一条命中的规则**，若有命中会返回 `confirmation_text` 与 `execute_query` 供前端确认或执行。
    - 目前告警触发主要来自摄像头（camera），调用告警处理时会根据摄像头上报的 `device_name` 去匹配相关规则。
    当温度查询后需要按当前温度匹配已记录规则，或需要保存 / 读取 / 清理待确认动作时，也使用 $ruisi-twinioc-opeationrule-skill。
