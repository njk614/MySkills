          \    elif cleaned_arg.startswith('A13'):\n        result = extract_info(cleaned_arg)\n\
          \    elif cleaned_arg.startswith('A14'):\n        result = extract_info(cleaned_arg)\n\
          \    elif cleaned_arg.startswith('A15'):\n        result = extract_info(cleaned_arg)\n\
          \    elif cleaned_arg.startswith('A16'):\n        result = extract_info(cleaned_arg)\n\
