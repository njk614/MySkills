          \ \n        result = extract_info(cleaned_arg)\n    elif cleaned_arg.startswith('B07'):\
          \ \n        result = extract_info(cleaned_arg)\n    elif cleaned_arg.startswith('B08'):\
          \ \n        result = extract_info(cleaned_arg)\n    \n    # 检查是否以C开头\n \
          \   elif cleaned_arg.startswith('C01'):\n        result = extract_info(cleaned_arg)\n\
          \    elif cleaned_arg.startswith('C02'):\n        result = extract_info(cleaned_arg)\n\
          \    else:\n        result = \"执行失败，失败原因：\" + cleaned_arg\n    \n    return\
          \ result\n\ndef main(arg1: str) -> dict:\n    resultorder = jiequorder(arg1)\
          \  # 现在返回的是正确分割的命令字符串\n    \n    # 去除前后空格并转换为大写\n    cleaned_arg = resultorder.strip().upper()\n\
