          \    只处理实际输出的部分，忽略思考部分中的示例\n    \"\"\"\n    import re\n    \n    # 方法1：查找最后一个完整的方括号对\n\
          \    # 从后往前查找最后一个 ']'\n    last_close_idx = info.rfind(']')\n    if last_close_idx\
          \ == -1:\n        return \"\"\n    \n    # 从最后一个 ']' 往前查找对应的 '['\n    last_open_idx\
          \ = info.rfind('[', 0, last_close_idx)\n    if last_open_idx == -1:\n  \
          \      return \"\"\n    \n    # 提取最后一个方括号中的内容\n    bracket_content = info[last_open_idx\
          \ + 1:last_close_idx].strip()\n    \n    if not bracket_content:\n     \
          \   return \"\"\n    \n    # 将方括号内的内容按&分割，然后用$连接所有命令\n    commands = bracket_content.split('&')\n\
          \    # 过滤空命令并去除空格\n    valid_commands = [cmd.strip() for cmd in commands\
          \ if cmd.strip()]\n    \n    # 将所有命令用$连接\n    result = \"$\".join(valid_commands)\n\
          \    return result\n\ndef extract_info(cleaned_arg: str) -> str:\n    \"\
          \"\"\n    从字符串中提取内容\n    格式如：B01：对象聚焦：XXX, A09：场景复位\n    返回第一个中文冒号之后的所有内容\n\
          \    \"\"\"\n    # 使用 split 方法，限制只分割一次\n    parts = cleaned_arg.split(\"\
          ：\", 1)\n    \n    # 如果成功分割（即包含冒号），返回第二部分并去除首尾空格\n    if len(parts) > 1:\n\
          \        return parts[1].strip()\n    else:\n        # 如果没有冒号，返回原字符串或空字符串，根据你的需求决定\n\
          \        # 这里假设如果没有冒号，可能格式错误，返回空字符串\n        return cleaned_arg.strip()\
          \ if cleaned_arg else \"\"\n\ndef process_single_command(cleaned_arg: str)\
          \ -> str:\n    \"\"\"\n    处理单个命令并返回结果\n    \"\"\"\n    # 初始化result变量\n\
          \    result = \"\"\n    \n    # 检查是否以D开头 - 特殊处理\n    if cleaned_arg.startswith('D'):\n\
          \        # 对于D开头的命令，直接从第四个字符开始截取（索引3），跳过\"D01：\"部分\n        if \"：\" in\
          \ cleaned_arg:\n            # 获取第一个冒号之后的所有内容\n            content = cleaned_arg.split(\"\
          ：\", 1)[1].strip()\n            # 按照你的要求格式化输出\n            return f\"为您查找到相关内容如下：{content}\"\
          \n        else:\n            # 如果没有冒号，直接截取第4个字符之后的内容\n            if len(cleaned_arg)\
          \ >= 4:\n                return f\"为您查找到相关内容如下：{cleaned_arg[3:]}\"\n   \
          \         else:\n                return \"执行失败，字符串长度不足\"\n    \n    # 检查是否以A开头\
          \ 层级\n    if cleaned_arg.startswith('A01'):\n        result = extract_info(cleaned_arg)\n\
          \    elif cleaned_arg.startswith('A02'):\n        result = extract_info(cleaned_arg)\n\
          \    elif cleaned_arg.startswith('A03'):\n        result = extract_info(cleaned_arg)\n\
          \    elif cleaned_arg.startswith('A04'):\n        result = extract_info(cleaned_arg)\n\
          \    elif cleaned_arg.startswith('A05'):\n        result = extract_info(cleaned_arg)\n\
