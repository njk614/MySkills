          \    elif cleaned_arg.startswith('A07'):\n        result = extract_info(cleaned_arg)\n\
          \    \n    # 检查是否以A开头 视野\n    elif cleaned_arg.startswith('A08'):\n    \
          \    result = extract_info(cleaned_arg)\n    elif cleaned_arg.startswith('A09'):\n\
          \        result = extract_info(cleaned_arg)\n    elif cleaned_arg.startswith('A10'):\n\
          \        result = extract_info(cleaned_arg)\n    elif cleaned_arg.startswith('A11'):\n\
