    - data:
        code: "from typing import List, Dict, Any\nimport json\n\ndef main(arg1: str,\
          \ arg2: List[Dict[str, Any]], arg3: List[Dict[str, Any]], arg4: str = \"\
          \") -> Dict[str, Any]:\n    \"\"\"\n    处理JSON数据并更新存储数组\n    \n    Args:\n\
          \        arg1: 输入的JSON字符串\n        arg2: 存储工具记录的数组，作为基础数组传入\n        arg3:\
          \ 存储倒数第二个对象data.output内容的数组，作为基础数组传入\n        arg4: 问题字符串，需要存储到arg3记录的question字段中\n\
          \    \n    Returns:\n        Dict[str, Any]: 包含处理结果和更新后的存储数组\n    \"\"\"\
          \n    \n    try:\n        # 解析输入数据\n        if isinstance(arg1, str):\n\
          \            input_data = json.loads(arg1)\n        else:\n            input_data\
          \ = arg1\n        \n        # 获取对话数据\n        if isinstance(input_data,\
          \ dict) and 'arg1' in input_data:\n            dialog_data = input_data['arg1']\n\
          \        else:\n            dialog_data = input_data\n        \n       \
          \ # 确保是列表\n        if not isinstance(dialog_data, list):\n            dialog_data\
          \ = [dialog_data]\n        \n        # 确保arg2是列表\n        if not isinstance(arg2,\
          \ list):\n            arg2 = []\n        \n        # 确保arg3是列表\n       \
          \ if not isinstance(arg3, list):\n            arg3 = []\n        \n    \
          \    # 复制传入的数组，避免直接修改原数组\n        existing_tool_records = arg2.copy()\n\
          \        existing_output_records = arg3.copy()\n        \n        # 收集新找到的工具记录\n\
          \        new_tool_records = []\n        \n        # 遍历对话数据，处理工具记录\n    \
          \    for item in dialog_data:\n            if not isinstance(item, dict):\n\
          \                continue\n            \n            # 检查是否有tool_responses\n\
          \            responses = None\n            try:\n                responses\
          \ = item.get('data', {}).get('output', {}).get('tool_responses', [])\n \
          \           except:\n                continue\n            \n          \
          \  if isinstance(responses, list):\n                for resp in responses:\n\
          \                    if isinstance(resp, dict):\n                      \
          \  tool_name = resp.get('tool_call_name')\n                        tool_response\
          \ = resp.get('tool_response')\n                        \n              \
          \          if tool_name is not None and tool_response is not None:\n   \
          \                         # 创建新记录\n                            record =\
          \ {\n                                'tool_call_name': tool_name,\n    \
          \                            'tool_response': tool_response\n          \
          \                  }\n                            new_tool_records.append(record)\n\
          \        \n        # 处理倒数第二个对象的data.output内容（修改部分）\n        new_output_record\
          \ = None\n        if len(dialog_data) >= 2:\n            # 获取倒数第二个对象\n \
          \           second_last_item = dialog_data[-2]\n            if isinstance(second_last_item,\
          \ dict):\n                try:\n                    output_content = second_last_item.get('data',\
          \ {}).get('output')\n                    if output_content is not None:\n\
          \                        # 获取output中最后一个[]中的内容\n                       \
          \ last_bracket_content = None\n                        if isinstance(output_content,\
          \ str):\n                            # 查找最后一个[]及其内容\n                  \
          \          last_open_bracket = output_content.rfind('[')\n             \
          \               last_close_bracket = output_content.rfind(']')\n       \
          \                     if last_open_bracket != -1 and last_close_bracket\
          \ != -1 and last_close_bracket > last_open_bracket:\n                  \
          \              last_bracket_content = output_content[last_open_bracket +\
          \ 1:last_close_bracket].strip()\n                        \n            \
          \            # 创建输出记录对象\n                        new_output_record = {\n\
          \                            'question': arg4 if arg4 else \"\",  # 添加arg4到question字段\n\
          \                            'content': last_bracket_content  # 存储最后一个[]中的内容\n\
          \                        }\n                except Exception as e:\n   \
          \                 print(f\"处理输出内容时出错: {e}\")\n        \n        # 处理工具记录：将新记录添加到现有记录的末尾（新的在后）\n\
          \        tool_result_msg = \"未找到新的工具记录\"\n        if new_tool_records:\n\
          \            # 先添加旧记录，再添加新记录（这样新记录在末尾）\n            existing_tool_records\
          \ = existing_tool_records + new_tool_records\n            \n           \
          \ # 限制最多20条记录（删除最前面的，即最旧的）\n            if len(existing_tool_records) >\
          \ 20:\n                existing_tool_records = existing_tool_records[-20:]\n\
          \            \n            tool_result_msg = f\"添加 {len(new_tool_records)}\
          \ 条新工具记录，当前共 {len(existing_tool_records)} 条记录\"\n        \n        # 处理输出记录：将新记录添加到现有记录的末尾（新的在后）\n\
          \        output_result_msg = \"未找到新的输出记录\"\n        if new_output_record\
          \ is not None:\n            # 先添加旧记录，再添加新记录（这样新记录在末尾）\n            existing_output_records\
          \ = existing_output_records + [new_output_record]\n            \n      \
          \      # 限制最多20条记录（删除最前面的，即最旧的）\n            if len(existing_output_records)\
          \ > 20:\n                existing_output_records = existing_output_records[-20:]\n\
          \            \n            output_result_msg = f\"添加 1 条新输出记录，当前共 {len(existing_output_records)}\
          \ 条记录\"\n        \n        # 组合结果消息\n        result_msg = f\"{tool_result_msg};\
          \ {output_result_msg}\"\n        \n        # 返回结果，包含处理结果和更新后的数组\n      \
          \  return {\n            \"result\": result_msg,\n            \"output\"\
          : existing_tool_records,\n            \"output2\": existing_output_records\n\
          \        }\n        \n    except Exception as e:\n        # 确保错误信息是字符串\n\
          \        error_msg = str(e)\n        # 返回错误结果\n        return {\n      \
          \      \"result\": f\"处理失败: {error_msg}\",\n            \"output\": arg2,\
          \  # 出错时返回原始数组\n            \"output2\": arg3  # 出错时返回原始数组\n        }"
