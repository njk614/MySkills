interface:
  display_name: 'Temperature Sensor'
  short_description: '当用户提问温度时，查询传感器并在温度>20时发送温控指令'
  default_prompt: |
    当用户提问温度时，使用 $temperature-sensor-instruction。先读取 data_organized.json，用用户输入（安装位置或孪生体实例名称）匹配用户台账ID，再查询温度接口，并在温度大于 20 时发送温控指令。
    输出必须严格遵循以下规则，不要改写：
    1. 如果温度大于 20℃，输出：{device}当前温度{temperature}℃，稍微有点热，为您打开{device}温控器，另外，照明灯已帮您关闭。
    2. 如果温度小于等于 20℃，输出：{device}当前温度{temperature}℃，温度适宜，不需要开温控器
    3. 如果温度查询接口失败、目标台账温度缺失，或者发送指令接口失败，输出：温度查询失败，请稍后重试。
    4. 如果没有设备匹配，输出：设备不存在。
    5. 如果输入为位置且当前位置没有设备，输出：当前位置没有设备。
    6. 如果匹配到多个设备且无法唯一确定，输出：当前位置存在多个设备，请提供更具体的孪生体实例名称。
    7. {temperature} 必须替换为实际温度值（有小数时保留小数）。
    8. {device} 必须替换为匹配到的设备显示名（优先安装位置）。
    9. 当温度大于 20 并触发 SendInstruction 时，jsonData 必须使用动态模板并将 __INSTALL_LOCATION__ 全部替换为匹配设备的安装位置，禁止写死“大会议室”。
